name: Sync upstream

# 触发方式
on:
  schedule:
    # 每天凌晨 0 点执行一次（可根据需要改为更高频率）
    - cron: '0 0 * * *'
  workflow_dispatch:   # 手动触发按钮

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}   # 只在 Fork 仓库运行

    steps:
      # 1. 检出当前 Fork 仓库
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 添加上游仓库（只在第一次运行时需要，后续可省略）
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Luoyacheng/legado.git
          git fetch upstream

      # 3. 合并上游最新提交到本分支
      - name: Sync with upstream
        run: |
          git checkout main
          git merge upstream/main --ff-only || true   # 若需要手动解决冲突，可去掉 --ff-only

      # 4. 推送合并后的结果回自己的 Fork
      - name: Push changes
        run: |
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}